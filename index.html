<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raghav Kaushik | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #0f172a;
    --text: #e2e8f0;
    --card: rgba(30,41,59,0.6);
    --accent: #38bdf8;
}

.light-mode {
    --bg: #f8fafc;
    --text: #0f172a;
    --card: rgba(255,255,255,0.6);
    --accent: #2563eb;
}

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
}

/* BACKGROUND BLOBS */
body::before, body::after {
    content: "";
    position: fixed;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.3;
    z-index: -1;
}
body::before {
    background: #38bdf8;
    top: -100px;
    left: -100px;
}
body::after {
    background: #6366f1;
    bottom: -100px;
    right: -100px;
}

/* NAVBAR */
.navbar {
    position: sticky;
    top: 0;
    backdrop-filter: blur(12px);
    background: var(--card);
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    z-index: 100;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    padding: 0 10%;
}

.hero h1 {
    font-size: 56px;
}

.typing {
    color: var(--accent);
}

/* BUTTON */
.btn {
    padding: 12px 24px;
    background: linear-gradient(135deg,#38bdf8,#6366f1);
    border-radius: 10px;
    text-decoration: none;
    color: white;
    display: inline-block;
    margin-top: 20px;
}

/* SECTIONS */
.section {
    padding: 100px 10%;
}

h2 {
    font-size: 36px;
}

/* TIMELINE */
.timeline {
    border-left: 2px solid var(--accent);
    padding-left: 20px;
}
.timeline-item {
    margin-bottom: 30px;
}

/* CARDS */
.card {
    background: var(--card);
    backdrop-filter: blur(12px);
    padding: 20px;
    border-radius: 16px;
    transition: 0.3s;
}
.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 0 30px rgba(56,189,248,0.3);
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap: 20px;
}

/* REVEAL */
.reveal {
    opacity: 0;
    transform: translateY(40px);
    transition: 1s;
}
.reveal.active {
    opacity: 1;
    transform: translateY(0);
}

/* TOGGLE */
#themeToggle {
    cursor: pointer;
}
</style>
</head>

<body>

<div class="navbar">
    <div>Raghav</div>
    <div id="themeToggle">🌙</div>
</div>

<!-- HERO -->
<section class="hero">
    <div>
        <h1>Hi, I'm Raghav</h1>
        <h2 class="typing"></h2>
        <a href="#" class="btn">View Resume</a>
    </div>
</section>

<!-- EXPERIENCE -->
<section class="section reveal">
    <h2>Experience</h2>
    <div class="timeline">
        <div class="timeline-item card">
            <h3>WNS Global Services</h3>
            <p>Fraud analytics, SQL insights, risk modeling</p>
        </div>
        <div class="timeline-item card">
            <h3>CRIS</h3>
            <p>Django + PostgreSQL development</p>
        </div>
    </div>
</section>

<!-- PROJECTS -->
<section class="section reveal">
    <h2>Projects</h2>
    <div class="grid">
        <div class="card">Diagnos_DB</div>
        <div class="card">Freight Tracking</div>
        <div class="card">Malware Detection</div>
        <div class="card">PG Life</div>
    </div>
</section>

<!-- SKILLS -->
<section class="section reveal">
    <h2>Skills</h2>
    <div class="grid">
        <div class="card">Python</div>
        <div class="card">SQL</div>
        <div class="card">PostgreSQL</div>
        <div class="card">Fraud Analytics</div>
    </div>
</section>

<script>
/* THEME */
const toggle = document.getElementById("themeToggle");
toggle.onclick = () => {
    document.body.classList.toggle("light-mode");
};

/* SCROLL REVEAL */
window.addEventListener("scroll", () => {
    document.querySelectorAll(".reveal").forEach(el => {
        if (el.getBoundingClientRect().top < window.innerHeight - 100) {
            el.classList.add("active");
        }
    });
});

/* TYPING EFFECT */
const text = ["Risk Analyst", "Data Analyst", "SQL Expert"];
let i=0,j=0,current="",isDeleting=false;

function type() {
    current = text[i];
    if(!isDeleting){
        j++;
        if(j==current.length) isDeleting=true;
    } else {
        j--;
        if(j==0){
            isDeleting=false;
            i=(i+1)%text.length;
        }
    }
    document.querySelector(".typing").innerText=current.substring(0,j);
    setTimeout(type,100);
}
type();
</script>

</body>
</html>
